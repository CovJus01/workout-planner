version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: frontend-development
    container_name: commonect-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: backend-development
    container_name: commonect-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://devuser:devpass@db:5432/commonect_dev # THIS MUST BE REPLACED WITH A REAL DATABASE_URL. WE WILL BE USING POSTGRESQL AS A BEGINNER DATABASE.
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: commonect-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: commonect_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
